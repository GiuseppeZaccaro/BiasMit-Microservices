spring.application.name=bias-mit-gateway
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bias_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URL microservizi Python (override via env var per cloud deploy)
python.inference.url=${PYTHON_INFERENCE_URL:http://localhost:8000}
python.analytics.url=${PYTHON_ANALYTICS_URL:http://localhost:8001}
python.interpretation.url=${PYTHON_INTERPRETATION_URL:http://localhost:8002}