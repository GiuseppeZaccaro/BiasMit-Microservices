models:
  # =========================================================================
  # 1. MISTRAL 7B V0.1
  # =========================================================================
  - id: mistral
    name: "Mistral 7B v0.1"
    architecture: "Dense Transformer"
    details: >
      32 layer residui, Hidden Size (h_d) 4096. Sliding Window Attention (SWA): finestra locale di
      4096 token (contesto totale 8k) per ridurre latenza e costi di inferenza. Grouped Query
      Attention (GQA) per ulteriore ottimizzazione. Vocabolario: 32.000 token. Note di Ricerca:
      allineamento di sicurezza moderato (menos restrittivo di modelli RLHF-pesanti), ideale per
      osservare attivazioni dirette sui bias senza mascheramento.
    steering_type: "categoriale"
    layers: [16]
    results:
      bbq:
        baseline:     "mistral/baseline_bbq_full.csv"
        caa_puntuale: "mistral/steered_bbq_L16_puntuale_categoriale.csv"
        fairsteer:    "mistral/risultati_bbq_FairSteer_L16_categoriale.csv"
      stereoset:
        baseline:     "mistral/baseline_stereoset_full.csv"
        caa_puntuale: "mistral/steered_stereoset_L16_puntuale_categoriale.csv"
        fairsteer:    "mistral/risultati_ss_FairSteer_L16_categoriale_k_ss-0.5.csv"

  # =========================================================================
  # 2. LLAMA 3.1 8B INSTRUCT
  # =========================================================================
  - id: llama
    name: "Llama 3.1 8B Instruct"
    architecture: "Dense Transformer"
    details: >
      32 layer residui, Hidden Size (h_d) 4096. Utilizza Grouped Query Attention (GQA) su tutti gli 8B di parametri 
      per ottimizzare il throughput di inferenza. Contesto nativo esteso a 128k token tramite RoPE scaling (costante di base a 500.000). 
      Vocabolario: 128.256 token basato su Tiktoken. Note di Ricerca: Essendo una versione Instruct (sottoposta a SFT e RLHF intensivo), 
      possiede già un solido allineamento di sicurezza nativo, rendendo l'analisi dello steering particolarmente interessante per valutare 
      l'interazione con barriere di sicurezza pre-esistenti.
    steering_type: "categoriale"
    layers: [16]
    results:
      bbq:
        baseline:     "llama/baseline_bbq_full.csv"
        caa_puntuale: "llama/steered_bbq_L16_puntuale_categoriale.csv"
        fairsteer:    "llama/risultati_bbq_FairSteer_L16_categoriale.csv"
      stereoset:
        baseline:     "llama/baseline_stereoset_full.csv"
        caa_puntuale: "llama/steered_stereoset_L16_puntuale_categoriale.csv"
        fairsteer:    "llama/risultati_ss_FairSteer_L16_categoriale_k_ss-0.5.csv"